name: Space Weather Monitor

on:
  schedule:
    # 08:00 WIB = 01:00 UTC (digeser 1 jam dari Daily News biar tidak tabrakan)
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r space-weather/requirements.txt

      - name: Run pipeline (fetch → detect → build dashboard)
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        working-directory: space-weather
        run: python3 run.py

      - name: Commit dashboard if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/space-weather/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(space-weather): refresh dashboard $(date -u +%Y-%m-%d)"
            git push
          fi

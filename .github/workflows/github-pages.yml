name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "threejs-orbit/**"
      - "docs/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: threejs-orbit/package-lock.json

      - name: Build Orbit Viewer
        working-directory: threejs-orbit
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/threejs-orbit
          cp docs/index.html _site/index.html
          cp -r threejs-orbit/dist/* _site/threejs-orbit/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

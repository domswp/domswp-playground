name: Update Pages (docs/)

on:
  push:
    branches: [main]
    paths:
      - "threejs-orbit/**"
      - "iss-tracker/**"
      - "docs/index.html"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: threejs-orbit/package-lock.json

      - name: Build Orbit Viewer for Pages
        working-directory: threejs-orbit
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: iss-tracker/package-lock.json

      - name: Build ISS Tracker for Pages
        working-directory: iss-tracker
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build

      - name: Copy into docs/
        run: |
          rm -rf docs/threejs-orbit/*
          mkdir -p docs/threejs-orbit
          cp -r threejs-orbit/dist/* docs/threejs-orbit/
          rm -rf docs/iss-tracker/*
          mkdir -p docs/iss-tracker
          cp -r iss-tracker/dist/* docs/iss-tracker/
          touch docs/.nojekyll

      - name: Commit docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/threejs-orbit docs/iss-tracker docs/.nojekyll
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(pages): refresh docs builds (orbit + iss-tracker)"
            git push
          fi

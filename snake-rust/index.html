<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Snake (Rust + WASM) — Lab Domas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="top">
        <h1>Snake</h1>
        <p class="sub">Engine ditulis di <strong>Rust</strong> → WebAssembly</p>
      </header>

      <div class="scoreboard">
        <div class="score-box">
          <span class="label">Skor</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="score-box">
          <span class="label">Terbaik</span>
          <span id="best" class="value">0</span>
        </div>
      </div>

      <div class="board-wrap">
        <canvas id="board" width="400" height="400"></canvas>
        <div id="overlay" class="overlay hidden">
          <p id="overlay-title">Game Over</p>
          <p id="overlay-sub">Tekan / ketuk untuk main lagi</p>
        </div>
      </div>

      <div class="controls">
        <button id="btn-restart" type="button">Main lagi</button>
        <div class="hint">Desktop: panah / WASD · Mobile: tombol di bawah</div>
      </div>

      <div class="dpad" aria-label="Kontrol arah">
        <button class="dir up" data-dir="0" aria-label="Atas">▲</button>
        <div class="dpad-mid">
          <button class="dir left" data-dir="3" aria-label="Kiri">◀</button>
          <button class="dir down" data-dir="2" aria-label="Bawah">▼</button>
          <button class="dir right" data-dir="1" aria-label="Kanan">▶</button>
        </div>
      </div>

      <footer class="bottom">
        <a href="../">← Lab Domas</a>
        <span id="status">Memuat WASM…</span>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
